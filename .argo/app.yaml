apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: syntra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app: syntra
    app.kubernetes.io/part-of: goalixa
spec:
  project: default
  source:
    repoURL: https://github.com/goalixa/syntra.git
    targetRevision: main
    path: helm/syntra
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: syntra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      name: syntra-secrets
      jqPathExpressions:
        - .data
