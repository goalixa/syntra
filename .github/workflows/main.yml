name: Build & Deploy Syntra (Helm)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'
      - '.argo/**'
      - 'helm/**'  # Ignore Helm chart changes to avoid loop
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'
      - '.argo/**'
      - 'helm/**'

permissions:
  contents: read
  actions: read

env:
  REGISTRY: harbor.goalixa.com
  IMAGE_REPOSITORY: syntra/app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          ./crane auth login harbor.goalixa.com -u '${{ secrets.HARBOR_USERNAME }}' -p '${{ secrets.HARBOR_PASSWORD }}'

      - name: Build and push multi-arch image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}"
          SHA_TAG="${GITHUB_SHA:0:7}"

          # Build and push amd64
          docker buildx build --platform linux/amd64 --load --tag ${IMAGE}:latest-amd64 .
          docker save ${IMAGE}:latest-amd64 -o image-amd64.tar
          ./crane push image-amd64.tar ${IMAGE}:latest-amd64

          # Build and push arm64
          docker buildx build --platform linux/arm64 --load --tag ${IMAGE}:latest-arm64 .
          docker save ${IMAGE}:latest-arm64 -o image-arm64.tar
          ./crane push image-arm64.tar ${IMAGE}:latest-arm64

          # Create multi-arch manifest for latest
          ./crane index append \
            --manifest ${IMAGE}:latest-amd64 \
            --manifest ${IMAGE}:latest-arm64 \
            --tag ${IMAGE}:latest

          # Also tag with SHA
          ./crane tag ${IMAGE}:latest ${IMAGE}:${SHA_TAG}

          echo "Pushed multi-arch image: ${IMAGE}:latest and ${IMAGE}:${SHA_TAG}"

      - name: Get image tag
        id: tag
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:7}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Setup kubectl
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
            echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
            echo "HAS_KUBE_CONFIG=true" >> $GITHUB_ENV
          else
            echo "HAS_KUBE_CONFIG=false" >> $GITHUB_ENV
          fi

      - name: Update ArgoCD application
        if: env.HAS_KUBE_CONFIG == 'true'
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"

          echo "🔄 Updating ArgoCD application with image tag: ${IMAGE_TAG}"

          # Patch ArgoCD app with new Helm parameter
          kubectl patch application syntra \
            -n argocd \
            --type='merge' \
            -p="{
              \"spec\": {
                \"source\": {
                  \"helm\": {
                    \"parameters\": [
                      {
                        \"name\": \"image.tag\",
                        \"value\": \"${IMAGE_TAG}\"
                      }
                    ]
                  }
                }
              }
            }"

          # Trigger immediate sync
          kubectl annotate application syntra \
            -n argocd \
            "force-sync-at=$(date +%s)" \
            --overwrite

          echo "✅ ArgoCD application updated"

      - name: Summary
        run: |
          echo "## ✅ Build & Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Full Image:** \`${{ steps.tag.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ env.HAS_KUBE_CONFIG }}" = "true" ]; then
            echo "- **Deployment Method:** Helm (ArgoCD - Auto-sync)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔄 ArgoCD will now:" >> $GITHUB_STEP_SUMMARY
            echo "1. Detect Helm parameter change" >> $GITHUB_STEP_SUMMARY
            echo "2. Render Helm chart with image tag: \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
            echo "3. Deploy to Kubernetes" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Deployment Method:** Helm (Manual sync required)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚠️ Manual Action Required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The \`KUBE_CONFIG\` secret is not configured. Please:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. **Add the secret** to your GitHub repository:" >> $GITHUB_STEP_SUMMARY
            echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "   # Encode your kubeconfig" >> $GITHUB_STEP_SUMMARY
            echo "   cat ~/.kube/config | base64 -w 0" >> $GITHUB_STEP_SUMMARY
            echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "2. **Add it as a secret** named \`KUBE_CONFIG\` in repository settings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "3. **Or manually trigger ArgoCD sync**:" >> $GITHUB_STEP_SUMMARY
            echo "   \`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "   kubectl patch application syntra -n argocd --type='merge' \\" >> $GITHUB_STEP_SUMMARY
            echo "     -p='{\"spec\":{\"source\":{\"helm\":{\"parameters\":[{\"name\":\"image.tag\",\"value\":\"${{ steps.tag.outputs.tag }}\"}]}}}}'" >> $GITHUB_STEP_SUMMARY
            echo "   kubectl annotate application syntra -n argocd \"force-sync-at=\$(date +%s)\" --overwrite" >> $GITHUB_STEP_SUMMARY
            echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
