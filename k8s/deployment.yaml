apiVersion: apps/v1
kind: Deployment
metadata:
  name: syntra
  namespace: syntra
  labels:
    app: syntra
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syntra
  template:
    metadata:
      labels:
        app: syntra
        component: api
    spec:
      containers:
      - name: syntra
        image: ghcr.io/amirrezarezaie/syntra:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: AUTH_SERVICE_URL
          value: "http://auth.goalixa-auth.svc.cluster.local:80"
        - name: KUBECTL_PATH
          value: "/usr/bin/kubectl"
        - name: MODEL_NAME
          value: "claude"
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
