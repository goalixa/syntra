apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syntra
  namespace: syntra
  annotations:
    # Traefik configuration
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # TLS configuration (Cloudflare provides SSL)
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "cloudflare"
spec:
  ingressClassName: traefik
  tls:
    # Cloudflare provides SSL termination
    - hosts:
        - syntra.goalixa.com
        - apisyntra.goalixa.com
      secretName: syntra-tls
  rules:
    # Admin Panel: syntra.goalixa.com
    - host: syntra.goalixa.com
      http:
        paths:
          - path: /admin/login
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /admin/static
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000

    # CLI API: apisyntra.goalixa.com
    - host: apisyntra.goalixa.com
      http:
        paths:
          # API routes (order matters: specific before general)
          - path: /api/ask
            pathType: Exact
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /api/health
            pathType: Exact
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /api/rate-limit
            pathType: Exact
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          # FastAPI docs (Prefix for assets like /docs/oauth2-redirect)
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: syntra
                port:
                  number: 8000
          # Catch-all (must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syntra
                port:
                  number: 8000
