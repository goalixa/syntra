# Default values for Syntra

replicaCount: 1

image:
  repository: ghcr.io/amirrezarezaie/syntra
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: syntra.goalixa.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: syntra-tls
      hosts:
        - syntra.goalixa.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  AUTH_SERVICE_URL: "http://auth-service.goalixa-auth.svc.cluster.local"
  KUBECTL_PATH: "/usr/bin/kubectl"
  MODEL_NAME: "claude"
  PYTHONUNBUFFERED: "1"

namespace: syntra
