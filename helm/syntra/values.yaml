# Default values for Syntra

replicaCount: 1

image:
  registry: harbor.goalixa.com
  repository: syntra/app
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: harbor-pull
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "traefik"
  annotations:
    # Traefik entrypoints
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # TLS configuration (Cloudflare provides SSL)
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "cloudflare"
    # Security headers
    traefik.ingress.kubernetes.io/middleware.sslheader: "true"
    traefik.ingress.kubernetes.io/middleware.browserxssfilter: "true"
    traefik.ingress.kubernetes.io/middleware.contentType: "true"
    traefik.ingress.kubernetes.io/middleware.frameDeny: "true"
    # Rate limiting for API
    traefik.ingress.kubernetes.io/middleware.rateLimit: "true"
  hosts:
    # Admin Panel: syntra.goalixa.com
    - host: syntra.goalixa.com
      paths:
        - path: /admin/login
          pathType: Prefix
        - path: /admin/static
          pathType: Prefix
        - path: /admin
          pathType: Prefix
        - path: /api/auth
          pathType: Prefix
        - path: /api/admin
          pathType: Prefix
    # CLI API: apisyntra.goalixa.com
    - host: apisyntra.goalixa.com
      paths:
        - path: /api/ask
          pathType: Exact
        - path: /api/health
          pathType: Exact
        - path: /api/rate-limit
          pathType: Exact
        - path: /api
          pathType: Prefix
        - path: /docs
          pathType: Exact
        - path: /
          pathType: Exact
  tls:
    # Cloudflare provides SSL termination
    - secretName: syntra-tls
      hosts:
        - syntra.goalixa.com
        - apisyntra.goalixa.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  AUTH_SERVICE_URL: "http://auth-service.goalixa-auth.svc.cluster.local"
  OPENAI_API_KEY: ""
  CREWAI_API_KEY: ""
  LOG_LEVEL: "INFO"
  MODEL_NAME: "claude"
  PYTHONUNBUFFERED: "1"
  CREWAI_STORAGE_PATH: "/tmp/crewai"

namespace: syntra
