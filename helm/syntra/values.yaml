# Default values for Syntra

replicaCount: 1

image:
  registry: harbor.goalixa.com
  repository: syntra/app
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: harbor-pull
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: syntra.goalixa.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: syntra-tls
      hosts:
        - syntra.goalixa.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  AUTH_SERVICE_URL: "http://auth-service.goalixa-auth.svc.cluster.local"
  OPENAI_API_KEY: ""
  CREWAI_API_KEY: ""
  LOG_LEVEL: "INFO"
  MODEL_NAME: "claude"
  PYTHONUNBUFFERED: "1"
  CREWAI_STORAGE_PATH: "/tmp/crewai"

namespace: syntra
