# Default values for Syntra

replicaCount: 1

image:
  registry: harbor.goalixa.com
  repository: syntra/app
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: harbor-pull
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    # Simple Traefik configuration for Cloudflare proxy mode
    # Cloudflare handles SSL termination - no TLS secret needed
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
    # Admin Panel: syntra.goalixa.com
    - host: syntra.goalixa.com
      paths:
        - path: /admin/login
          pathType: Prefix
        - path: /admin/static
          pathType: Prefix
        - path: /admin
          pathType: Prefix
        - path: /api/auth
          pathType: Prefix
        - path: /api/admin
          pathType: Prefix
    # CLI API: apisyntra.goalixa.com
    - host: apisyntra.goalixa.com
      paths:
        # API routes (order matters: specific before general)
        - path: /api/ask
          pathType: Exact
        - path: /api/health
          pathType: Exact
        - path: /api/rate-limit
          pathType: Exact
        - path: /api
          pathType: Prefix
        # FastAPI docs (Prefix for assets like /docs/oauth2-redirect)
        - path: /docs
          pathType: Prefix
        - path: /redoc
          pathType: Prefix
        - path: /openapi.json
          pathType: Exact
        # Catch-all (must be last)
        - path: /
          pathType: Prefix
  # No TLS section - Cloudflare handles SSL termination in proxy mode

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  AUTH_SERVICE_URL: "http://auth-service.goalixa-auth.svc.cluster.local"
  OPENAI_API_KEY: ""
  CREWAI_API_KEY: ""
  LOG_LEVEL: "INFO"
  MODEL_NAME: "claude"
  PYTHONUNBUFFERED: "1"
  CREWAI_STORAGE_PATH: "/tmp/crewai"

namespace: syntra
